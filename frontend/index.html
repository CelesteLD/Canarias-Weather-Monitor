<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canarias Weather Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      .leaflet-container { background: #050e1f !important; }
      .leaflet-tile-pane { filter: brightness(0.85) saturate(0.7); }
      .weather-tooltip .leaflet-tooltip { background: transparent !important; border: none !important; box-shadow: none !important; }
      .leaflet-control-attribution { background: rgba(5,10,20,0.7) !important; color: rgba(255,255,255,0.3) !important; font-size: 9px !important; }
      .leaflet-control-attribution a { color: rgba(56,189,248,0.5) !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
